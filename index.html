<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>stemplay</title>
<style>
:root {
  --bg: #f5efe8;
  --surface: #ebe3d9;
  --text: #2a2520;
  --accent: #8b6f47;
  --muted: #a89580;
  --border: #d9cfc2;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 3rem 1.5rem;
  font-size: 14px;
  line-height: 1.6;
}
.container { max-width: 720px; margin: 0 auto; }
h1 {
  font-weight: 300;
  font-size: 1.75rem;
  letter-spacing: 0.08em;
  margin-bottom: 0.25rem;
}
.sub {
  color: var(--muted);
  font-size: 0.85rem;
  letter-spacing: 0.05em;
  margin-bottom: 2.5rem;
}
.drop-zone {
  border: 1.5px dashed var(--border);
  border-radius: 0.75rem;
  padding: 2.5rem 1.5rem;
  text-align: center;
  color: var(--muted);
  transition: all 0.2s ease;
  cursor: pointer;
  display: block;
}
.drop-zone:hover, .drop-zone.active {
  background: var(--surface);
  border-color: var(--accent);
  color: var(--text);
}
.drop-zone input { display: none; }

.stems {
  margin-top: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
}
.stem {
  background: var(--surface);
  border-radius: 0.6rem;
  padding: 0.85rem 1.1rem;
  display: flex;
  align-items: center;
  gap: 0.9rem;
  cursor: pointer;
}
.stem.focused {
  outline: 1.5px solid var(--accent);
  background: var(--bg);
}
.stem .focus-idx {
  font-size: 0.7rem;
  color: var(--muted);
  min-width: 1rem;
  text-align: center;
  font-variant-numeric: tabular-nums;
}
.stem .name {
  flex: 1;
  font-size: 0.9rem;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.stem button {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 0.4rem;
  padding: 0.3rem 0.65rem;
  cursor: pointer;
  font-size: 0.75rem;
  letter-spacing: 0.05em;
  transition: all 0.15s;
  min-width: 2rem;
}
.stem button:hover { color: var(--text); border-color: var(--muted); }
.stem button.active {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}
.stem input[type=range] {
  width: 100px;
  accent-color: var(--accent);
  cursor: pointer;
}

.controls {
  margin-top: 1.5rem;
  background: var(--surface);
  border-radius: 0.6rem;
  padding: 1rem 1.2rem;
  display: none;
  gap: 0.75rem;
  flex-direction: column;
}
.controls.visible { display: flex; }
.playbar {
  display: flex;
  align-items: center;
  gap: 0.9rem;
}
.playbar .play {
  width: 2.5rem;
  height: 2.5rem;
  border-radius: 50%;
  background: var(--accent);
  color: var(--bg);
  border: none;
  cursor: pointer;
  font-size: 0.9rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.1s;
  flex-shrink: 0;
}
.playbar .play:hover { transform: scale(1.05); }
.playbar .time {
  font-variant-numeric: tabular-nums;
  font-size: 0.8rem;
  color: var(--muted);
  min-width: 2.5rem;
}
.playbar input[type=range] {
  flex: 1;
  accent-color: var(--accent);
  cursor: pointer;
}
.masterbar {
  display: flex;
  align-items: center;
  gap: 0.9rem;
}
.masterbar label {
  font-size: 0.75rem;
  color: var(--muted);
  letter-spacing: 0.04em;
  min-width: 3.5rem;
}
.masterbar input[type=range] {
  width: 120px;
  accent-color: var(--accent);
  cursor: pointer;
}
.masterbar .master-val {
  font-size: 0.75rem;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
  min-width: 2.5rem;
}
.clear {
  text-align: right;
}
.clear button {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 0.75rem;
  letter-spacing: 0.05em;
  cursor: pointer;
  padding: 0.25rem 0.5rem;
}
.clear button:hover { color: var(--text); }
.shortcuts {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem 1.2rem;
  margin-bottom: 2rem;
  font-size: 0.75rem;
  color: var(--muted);
}
.shortcuts span { display: flex; align-items: center; gap: 0.3rem; }
kbd {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 0.3rem;
  padding: 0.1rem 0.4rem;
  font-family: inherit;
  font-size: 0.7rem;
  color: var(--text);
}
</style>
</head>
<body>
<div class="container">
  <h1>stemplay</h1>
  <div class="sub">drag stems to play together</div>
  <div class="shortcuts" id="shortcuts"></div>
  <label class="drop-zone" id="drop">
    <div>drop audio files here, or click to select</div>
    <input type="file" id="files" multiple accept="audio/*">
  </label>
  <div class="stems" id="stems"></div>
  <div class="controls" id="controls">
    <div class="playbar">
      <button class="play" id="playBtn">▶</button>
      <span class="time" id="curTime">0:00</span>
      <input type="range" id="seek" min="0" max="100" value="0" step="0.01">
      <span class="time" id="totTime">0:00</span>
    </div>
    <div class="masterbar">
      <label>master vol</label>
      <input type="range" id="masterVol" min="0" max="1" step="0.01" value="1">
      <span class="master-val" id="masterValDisplay">100%</span>
    </div>
    <div class="clear"><button id="clearBtn">clear all</button></div>
  </div>
</div>
<script>
// DEV: 填檔名自動載入（需跑 local HTTP server，e.g. python3 -m http.server 8080）
// 音檔放在同目錄下即可
const DEV_STEMS = [
  // 'vocals.mp3',
  // 'drums.mp3',
  // 'bass.mp3',
  // 'other.mp3',
];

const ctx = new (window.AudioContext || window.webkitAudioContext)();
const masterGain = ctx.createGain();
masterGain.connect(ctx.destination);

const stems = [];
let isPlaying = false;
let startTime = 0;
let pauseOffset = 0;
let duration = 0;
let focusedIdx = -1;

const $ = id => document.getElementById(id);

const SHORTCUTS = [
  { keys: ['space'], desc: 'play/pause' },
  { keys: ['0', '1–9'], desc: 'seek' },
  { keys: ['←', '→'], desc: '±5s' },
  { keys: ['j', 'k'], desc: 'focus track' },
  { keys: ['h', 'l'], desc: 'track vol' },
  { keys: ['-', '='], desc: 'master vol' },
  { keys: ['m'], desc: 'mute' },
  { keys: ['s'], desc: 'solo' },
];
$('shortcuts').innerHTML = SHORTCUTS.map(({ keys, desc }) =>
  `<span>${keys.map(k => `<kbd>${k}</kbd>`).join('')} ${desc}</span>`
).join('');

const drop = $('drop'), filesInput = $('files'), stemsEl = $('stems'), controls = $('controls');
const playBtn = $('playBtn'), seek = $('seek'), curTime = $('curTime'), totTime = $('totTime');
const clearBtn = $('clearBtn');
const masterVolEl = $('masterVol'), masterValDisplay = $('masterValDisplay');

const fmt = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
const pct = v => `${Math.round(v * 100)}%`;

// master volume
masterVolEl.oninput = () => {
  masterGain.gain.value = +masterVolEl.value;
  masterValDisplay.textContent = pct(+masterVolEl.value);
};

drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('active'); });
drop.addEventListener('dragleave', () => drop.classList.remove('active'));
drop.addEventListener('drop', e => {
  e.preventDefault();
  drop.classList.remove('active');
  handleFiles(e.dataTransfer.files);
});
filesInput.addEventListener('change', e => handleFiles(e.target.files));

async function handleFiles(files) {
  for (const f of files) {
    if (!f.type.startsWith('audio/')) continue;
    try {
      const ab = await f.arrayBuffer();
      const buf = await ctx.decodeAudioData(ab);
      duration = Math.max(duration, buf.duration);
      const gain = ctx.createGain();
      gain.connect(masterGain);
      const stem = { name: f.name, buffer: buf, gain, volume: 1, muted: false, solo: false, source: null };
      stems.push(stem);
      renderStem(stem);
    } catch (err) {
      console.error('failed to decode', f.name, err);
    }
  }
  totTime.textContent = fmt(duration);
  seek.max = duration;
  controls.classList.add('visible');
  if (focusedIdx === -1) setFocus(0);
}

async function handleUrls(urls) {
  for (const url of urls) {
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`fetch failed: ${res.status}`);
      const ab = await res.arrayBuffer();
      const buf = await ctx.decodeAudioData(ab);
      duration = Math.max(duration, buf.duration);
      const gain = ctx.createGain();
      gain.connect(masterGain);
      const name = url.split('/').pop();
      const stem = { name, buffer: buf, gain, volume: 1, muted: false, solo: false, source: null };
      stems.push(stem);
      renderStem(stem);
    } catch (err) {
      console.error('failed to load', url, err);
    }
  }
  if (!stems.length) return;
  totTime.textContent = fmt(duration);
  seek.max = duration;
  controls.classList.add('visible');
  if (focusedIdx === -1) setFocus(0);
}

function setFocus(idx) {
  if (idx < 0 || idx >= stems.length) return;
  if (focusedIdx >= 0 && stems[focusedIdx]._el)
    stems[focusedIdx]._el.classList.remove('focused');
  focusedIdx = idx;
  if (stems[focusedIdx]._el)
    stems[focusedIdx]._el.classList.add('focused');
}

function renderStem(stem) {
  const el = document.createElement('div');
  el.className = 'stem';
  const displayName = stem.name.replace(/\.[^.]+$/, '');
  const idx = stems.indexOf(stem);
  el.innerHTML = `
    <span class="focus-idx">${idx + 1}</span>
    <span class="name">${displayName}</span>
    <button data-act="solo">S</button>
    <button data-act="mute">M</button>
    <input type="range" min="0" max="1" step="0.01" value="1">
  `;
  const btnSolo = el.querySelector('[data-act=solo]');
  const btnMute = el.querySelector('[data-act=mute]');
  const vol = el.querySelector('input[type=range]');
  btnSolo.onclick = () => { stem.solo = !stem.solo; btnSolo.classList.toggle('active'); updateGains(); };
  btnMute.onclick = () => { stem.muted = !stem.muted; btnMute.classList.toggle('active'); updateGains(); };
  vol.oninput = e => { stem.volume = +e.target.value; updateGains(); };
  el.onclick = () => setFocus(stems.indexOf(stem));
  stem._el = el;
  stem._volEl = vol;
  stem._muteBtn = btnMute;
  stem._soloBtn = btnSolo;
  stemsEl.appendChild(el);
}

function updateGains() {
  const hasSolo = stems.some(s => s.solo);
  for (const s of stems) {
    const active = hasSolo ? s.solo : !s.muted;
    s.gain.gain.value = active ? s.volume : 0;
  }
}

function startAll(offset) {
  stopAll(false);
  for (const s of stems) {
    const src = ctx.createBufferSource();
    src.buffer = s.buffer;
    src.connect(s.gain);
    src.start(0, Math.min(offset, s.buffer.duration));
    s.source = src;
  }
  startTime = ctx.currentTime - offset;
  isPlaying = true;
  playBtn.textContent = '❚❚';
}

function stopAll(updateUI = true) {
  for (const s of stems) {
    if (s.source) { try { s.source.stop(); } catch {} s.source = null; }
  }
  isPlaying = false;
  if (updateUI) playBtn.textContent = '▶';
}

function seekTo(t) {
  t = Math.max(0, Math.min(t, duration));
  pauseOffset = t;
  seek.value = t;
  curTime.textContent = fmt(t);
  if (isPlaying) startAll(t);
}

playBtn.onclick = () => {
  if (!stems.length) return;
  ctx.resume();
  if (isPlaying) {
    pauseOffset = ctx.currentTime - startTime;
    stopAll();
  } else {
    startAll(pauseOffset);
  }
};

seek.oninput = () => {
  pauseOffset = +seek.value;
  curTime.textContent = fmt(pauseOffset);
  if (isPlaying) startAll(pauseOffset);
};

clearBtn.onclick = () => {
  stopAll();
  stems.forEach(s => s.gain.disconnect());
  stems.length = 0;
  stemsEl.innerHTML = '';
  duration = 0;
  pauseOffset = 0;
  focusedIdx = -1;
  seek.value = 0;
  curTime.textContent = '0:00';
  totTime.textContent = '0:00';
  controls.classList.remove('visible');
};

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;

  // play/pause
  if (e.key === ' ') { e.preventDefault(); playBtn.click(); return; }

  // seek: 0 → start, 1-9 → 10%-90%
  if (e.key === '0') { e.preventDefault(); seekTo(0); return; }
  if (e.key >= '1' && e.key <= '9') {
    e.preventDefault();
    seekTo(duration * parseInt(e.key) / 10);
    return;
  }

  // seek: arrow keys ±5s
  if (e.key === 'ArrowRight') {
    e.preventDefault();
    seekTo((isPlaying ? ctx.currentTime - startTime : pauseOffset) + 5);
    return;
  }
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    seekTo((isPlaying ? ctx.currentTime - startTime : pauseOffset) - 5);
    return;
  }

  // master volume: - / =
  if (e.key === '=') {
    e.preventDefault();
    masterGain.gain.value = Math.min(masterGain.gain.value + 0.05, 1);
    masterVolEl.value = masterGain.gain.value;
    masterValDisplay.textContent = pct(masterGain.gain.value);
    return;
  }
  if (e.key === '-') {
    e.preventDefault();
    masterGain.gain.value = Math.max(masterGain.gain.value - 0.05, 0);
    masterVolEl.value = masterGain.gain.value;
    masterValDisplay.textContent = pct(masterGain.gain.value);
    return;
  }

  // track navigation
  if (!stems.length) return;
  if (e.key === 'j') { e.preventDefault(); setFocus(Math.min(focusedIdx + 1, stems.length - 1)); return; }
  if (e.key === 'k') { e.preventDefault(); setFocus(Math.max(focusedIdx - 1, 0)); return; }

  // focused track ops
  if (focusedIdx < 0) return;
  const fs = stems[focusedIdx];
  if (e.key === 'l') {
    e.preventDefault();
    fs.volume = Math.min(fs.volume + 0.05, 1);
    fs._volEl.value = fs.volume;
    updateGains();
  } else if (e.key === 'h') {
    e.preventDefault();
    fs.volume = Math.max(fs.volume - 0.05, 0);
    fs._volEl.value = fs.volume;
    updateGains();
  } else if (e.key === 'm') {
    e.preventDefault();
    fs.muted = !fs.muted;
    fs._muteBtn.classList.toggle('active', fs.muted);
    updateGains();
  } else if (e.key === 's') {
    e.preventDefault();
    fs.solo = !fs.solo;
    fs._soloBtn.classList.toggle('active', fs.solo);
    updateGains();
  }
});

setInterval(() => {
  if (isPlaying) {
    const t = ctx.currentTime - startTime;
    if (t >= duration) {
      pauseOffset = 0;
      stopAll();
      seek.value = 0;
      curTime.textContent = '0:00';
      return;
    }
    seek.value = t;
    curTime.textContent = fmt(t);
  }
}, 100);

// dev auto-load
if (DEV_STEMS.length) handleUrls(DEV_STEMS);
</script>
</body>
</html>
